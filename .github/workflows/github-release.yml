name: GitHub release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0. Leave blank to use v<package.json version>."
        required: false
      target:
        description: "Branch or commit SHA to tag and publish when creating a manual release. Leave blank to use the workflow run commit."
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Resolve release target
        id: target
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TARGET="${{ github.event.inputs.target }}"
            if [[ -z "$TARGET" ]]; then
              TARGET="${GITHUB_SHA}"
            fi
          else
            TARGET="${GITHUB_SHA}"
          fi

          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Check out release target
        shell: bash
        run: git checkout --detach "${{ steps.target.outputs.target }}"

      - name: Resolve package metadata
        id: meta
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
            if [[ -z "$TAG" ]]; then
              TAG="v$PACKAGE_VERSION"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          EXPECTED_TAG="v$PACKAGE_VERSION"
          if [[ "$TAG" != "$EXPECTED_TAG" ]]; then
            echo "Release tag ($TAG) must match package.json version ($EXPECTED_TAG)." >&2
            exit 1
          fi

          {
            echo "package_name=$PACKAGE_NAME"
            echo "package_version=$PACKAGE_VERSION"
            echo "tag=$TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          PACKAGE_NAME: ${{ steps.meta.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.meta.outputs.package_version }}
          TARGET: ${{ steps.target.outputs.target }}
        shell: bash
        run: |
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists."
            exit 0
          fi

          NOTES=$(printf '%s\n' \
            '## Package' \
            "- npm: https://www.npmjs.com/package/$PACKAGE_NAME" \
            '' \
            '## Version' \
            "- npm package version: $PACKAGE_VERSION")

          gh release create "$TAG" \
            --title "$TAG" \
            --target "$TARGET" \
            --notes "$NOTES"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_NAME: ${{ steps.meta.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.meta.outputs.package_version }}
        shell: bash
        run: |
          if [[ -z "${NODE_AUTH_TOKEN}" ]]; then
            echo "NPM_TOKEN secret is not configured." >&2
            exit 1
          fi

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version > /dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published."
            exit 0
          fi

          npm publish
